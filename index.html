<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>PlayPen</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0d0b14;
        overflow: hidden;
        overscroll-behavior: none;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game {
        outline: none;
        width: 100%;
        height: 100%;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #editor-root {
        position: absolute;
        inset: 0;
        display: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="stage"><canvas id="game" width="640" height="360" tabindex="0"></canvas></div>
    <div id="editor-root"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
